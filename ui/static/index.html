<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AUTORESEARCH // DASHBOARD</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.14.9/dist/cdn.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked@4.3.0/marked.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/dompurify@3/dist/purify.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=VT323&family=JetBrains+Mono:wght@400;700&family=Fira+Code:wght@400;500&display=swap" rel="stylesheet">
    <!-- Catode32 cat sprite — working companion in sidebar -->
    <script src="/modules/cat.js"></script>
    <!-- Matrix rain background -->
    <script src="/modules/matrix.js"></script>
    <!-- Organism evolution visualizer -->
    <script src="/modules/organism.js"></script>
    <!-- xterm.js CDN (GPU-accelerated terminal for chat) -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@xterm/xterm@6.0.0/css/xterm.css">
    <script src="https://cdn.jsdelivr.net/npm/@xterm/xterm@6.0.0/lib/xterm.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@xterm/addon-webgl@0.19.0/lib/addon-webgl.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@xterm/addon-fit@0.11.0/lib/addon-fit.js"></script>
    <!-- Chat UI modules -->
    <link rel="stylesheet" href="/css/xterm.css">
    <script src="/js/terminal.js"></script>
    <link rel="stylesheet" href="/css/main.css">
</head>
<body class="text-[var(--ng2)] min-h-screen crt flicker" x-cloak x-data="app()">

    <!-- Toast -->
    <div x-show="toast.show" x-transition:enter="transition ease-out duration-200"
         x-transition:enter-start="opacity-0 translate-y-2" x-transition:enter-end="opacity-100 translate-y-0"
         x-transition:leave="transition ease-in duration-150"
         x-transition:leave-start="opacity-100" x-transition:leave-end="opacity-0 translate-y-2"
         class="fixed top-4 right-4 z-50 px-4 py-2 border text-xs tracking-wider"
         :class="toast.type === 'success' ? 'border-[var(--ng)] text-[var(--ng)] bg-[rgba(57,255,20,0.08)]' : toast.type === 'error' ? 'border-[var(--red)] text-[var(--red)] bg-[rgba(255,51,51,0.08)]' : 'border-[var(--cyan)] text-[var(--cyan)] bg-[rgba(0,229,255,0.08)]'"
         x-text="toast.message"></div>

    <!-- Command Palette (Ctrl+Shift+P) -->
    <div x-show="cmdPalette.show" x-cloak class="fixed inset-0 z-50 flex items-start justify-center pt-[15vh]" @click.self="cmdPalette.show = false">
        <div class="bg-[var(--bg)] border-2 border-[var(--v-dim)] w-full max-w-lg mx-4 shadow-2xl" @click.stop>
            <!-- Search input -->
            <div class="flex items-center border-b border-[var(--v-dim)] px-3">
                <span class="text-[var(--v3)] text-xs mr-2">></span>
                <input id="cmd-palette-input" x-model="cmdPalette.query" @input="filterCmdPalette()"
                       @keydown="onCmdPaletteKeydown($event)"
                       placeholder="Type a command..."
                       class="flex-1 bg-transparent py-3 text-sm text-[var(--ng2)] tracking-wider outline-none"
                       autocomplete="off" spellcheck="false">
            </div>
            <!-- Results -->
            <div class="max-h-[50vh] overflow-y-auto py-1">
                <template x-for="(cmd, idx) in cmdPalette._results" :key="cmd.id">
                    <button @click="cmd.action(); cmdPalette.show = false;"
                            class="w-full text-left px-3 py-2 flex items-center gap-3 transition-colors"
                            :class="idx === cmdPalette.selected ? 'bg-[rgba(180,74,255,0.1)] text-[var(--v)]' : 'text-[var(--ng2)] hover:bg-[var(--bg2)]'">
                        <span class="text-[9px] tracking-widest text-[var(--v3)] w-16 shrink-0" x-text="cmd.category"></span>
                        <span class="text-sm flex-1" x-text="cmd.label"></span>
                        <span class="text-[9px] text-[var(--v3)]" x-text="cmd.shortcut || ''"></span>
                    </button>
                </template>
            </div>
            <!-- No results -->
            <div x-show="cmdPalette._results.length === 0" class="py-6 text-center text-[10px] text-[var(--v3)] tracking-widest">NO_COMMANDS_FOUND_</div>
            <!-- Footer -->
            <div class="border-t border-[var(--v-dim)] px-3 py-2 flex items-center gap-4 text-[9px] text-[var(--v3)]">
                <span><kbd class="px-1 border border-[var(--v-dim)]">&#x2191;&#x2193;</kbd> navigate</span>
                <span><kbd class="px-1 border border-[var(--v-dim)]">Enter</kbd> execute</span>
                <span><kbd class="px-1 border border-[var(--v-dim)]">Esc</kbd> close</span>
            </div>
        </div>
    </div>

    <div class="flex h-screen overflow-hidden relative z-10">

        <!-- ========== SIDEBAR (template: sidebar.js) ========== -->
        <aside class="bg-[var(--bg)] border-r-2 border-[var(--v-dim)] flex flex-col shrink-0 transition-all duration-200"
               :class="settings.compactSidebar ? 'w-16' : 'w-64'"
               id="sidebar-root">
            <!-- Loaded by templates/sidebar.js -->
        </aside>

        <!-- ========== MAIN ========== -->
        <main class="flex-1 overflow-y-auto bg-[var(--bg)]">

            <!-- ==================== RESEARCH LAB SECTION ==================== -->
            <div x-show="section === 'lab'" class="h-full">

                <!-- ==================== DASHBOARD (template: lab-dashboard.js) ==================== -->
                <div x-show="page === 'dashboard' && section === 'lab'" class="p-6 max-w-7xl mx-auto" id="lab-dashboard-root">
                    <!-- Loaded by templates/lab-dashboard.js -->
                </div>

                <!-- ==================== EXPERIMENTS (template: lab-experiments.js) ==================== -->
                <div x-show="page === 'experiments' && section === 'lab'" class="p-6 max-w-7xl mx-auto" id="lab-experiments-root">
                    <!-- Loaded by templates/lab-experiments.js -->
                </div>

                <!-- ==================== CHANGES LOG (template: lab-minor.js) ==================== -->
                <div x-show="page === 'changes' && section === 'lab'" class="p-6 max-w-5xl mx-auto" id="lab-changes-root">
                    <!-- Loaded by templates/lab-minor.js -->
                </div>

                <!-- ==================== PROMPT EDITOR (template: lab-minor.js) ==================== -->
                <div x-show="page === 'prompt' && section === 'lab'" class="p-6 max-w-5xl mx-auto" id="lab-prompt-root">
                    <!-- Loaded by templates/lab-minor.js -->
                </div>

                <!-- ==================== CONFIG (template: lab-minor.js) ==================== -->
                <div x-show="page === 'config' && section === 'lab'" class="p-6 max-w-4xl mx-auto" id="lab-config-root">
                    <!-- Loaded by templates/lab-minor.js -->
                </div>

                <!-- ==================== RUN CONTROL (template: lab-run.js) ==================== -->
                <div x-show="page === 'run' && section === 'lab'" class="p-6 max-w-5xl mx-auto" id="lab-run-root">
                    <!-- Loaded by templates/lab-run.js -->
                </div>

                <!-- ==================== SETTINGS (template: lab-settings.js) ==================== -->
                <div x-show="page === 'settings' && section === 'lab'" class="p-6 max-w-4xl mx-auto" id="lab-settings-root">
                    <!-- Loaded by templates/lab-settings.js -->
                </div>

            </div><!-- end Research Lab section -->

            <!-- ==================== CHAT SECTION (template: chat-section.js) ==================== -->
            <div x-show="section === 'chat'" class="h-full flex flex-col" id="chat-section-root">
                <!-- Loaded by templates/chat-section.js -->
            </div><!-- end Chat section -->

            <!-- New session path modal -->
            <div x-show="showNewSessionModal" x-cloak class="fixed inset-0 z-40 flex items-center justify-center bg-black/60" @click.self="showNewSessionModal = false">
                <div class="bg-[var(--bg2)] border-2 border-[var(--v-dim)] p-5 max-w-md mx-4 w-full">
                    <div class="flex items-center justify-between mb-3">
                        <div class="text-sm text-[var(--v)] tracking-widest">NEW_SESSION</div>
                        <button @click="showNewSessionModal = false" class="text-[var(--v3)] hover:text-[var(--red)] text-xs">[X]</button>
                    </div>
                    <div class="text-[10px] text-[var(--v3)] tracking-wider mb-2">PROJECT_PATH_</div>
                    <input x-model="newSessionPath" type="text" placeholder="e.g. F:\Projects\myapp or ."
                           @keydown.enter="createSessionFromModal()"
                           class="w-full bg-[var(--bg)] border border-[var(--v-dim)] px-2 py-1.5 text-sm text-[var(--ng2)] mb-3 tracking-wider"
                           x-ref="newSessionInput">
                    <div class="flex gap-2">
                        <button @click="createSessionFromModal()"
                                class="flex-1 px-3 py-1.5 border border-[var(--v)] text-[var(--v)] text-xs tracking-wider hover:bg-[rgba(180,74,255,0.1)] transition-all">[> CONNECT]</button>
                        <button @click="showNewSessionModal = false"
                                class="px-3 py-1.5 border border-[var(--v-dim)] text-[var(--v3)] text-xs tracking-wider hover:border-[var(--ng3)] transition-all">CANCEL</button>
                    </div>
                </div>
            </div>

        </main>
    </div>

    <!-- ========== TEMPLATE LOADERS (must execute BEFORE Alpine deferred init) ========== -->
    <script src="/templates/sidebar.js"></script>
    <script src="/templates/lab-dashboard.js"></script>
    <script src="/templates/lab-experiments.js"></script>
    <script src="/templates/lab-minor.js"></script>
    <script src="/templates/lab-run.js"></script>
    <script src="/templates/lab-settings.js"></script>
    <script src="/templates/chat-section.js"></script>

    <!-- JS modules (spread into app() via ...window.AppXxx) -->
    <script src="/js/modules/utils.js"></script>
    <script src="/js/modules/themes.js"></script>
    <script src="/js/modules/renderer.js"></script>
    <script src="/js/modules/lab.js"></script>
    <script src="/js/modules/chat.js"></script>

    <!-- Main application logic (after templates fill placeholders) -->
    <script src="/js/app.js"></script>

    <!-- Matrix rain toggle (inside x-data scope via x-data on body) -->
    <div x-data="{ matrixPaused: false }" class="contents">
        <button @click="matrixPaused = window.MatrixRain ? MatrixRain.toggle() : true"
                class="fixed bottom-4 right-4 z-50 px-2 py-1 text-[10px] tracking-widest border border-[var(--v-dim)] bg-[rgba(12,11,20,0.7)] text-[var(--v3)] hover:text-[var(--v)] hover:border-[var(--v2)] transition-all"
                x-text="matrixPaused ? '> RESUME' : '> PAUSE'">
        </button>
    </div>
</body>
</html>
